name: Full build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
    - name: Install dependencies
      run: |
        pacman-key --init
        pacman -Syu --noconfirm
        pacman -S --noconfirm --needed nodejs git clang cmake ninja shaderc vulkan-headers vulkan-validation-layers vulkan-utility-libraries wayland wayland-protocols libxkbcommon glm libpng libjpeg-turbo libjxl libwebp libheif systemd-libs libdrm libdisplay-info mesa python mold libtiff libraw openexr libsixel cairo librsvg libexif pugixml catch2 llvm
    - uses: actions/checkout@v4
    - name: clang configure
      run: cmake -B build --preset=release -DCMAKE_INSTALL_PREFIX:PATH=/usr
      env:
        CC: clang
        CXX: clang++
    - name: clang build
      run: ninja -C build
    - name: clang tests
      run: ninja -C build test
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
    - name: install
      run: ninja -C build install
      env:
        DESTDIR: ${{ github.workspace }}/install
    - name: gcc configure
      run: cmake -G Ninja -B build-gcc --preset=release -DBUILD_MCORE=1
      env:
        CC: gcc
        CXX: g++
    - name: gcc build
      run: ninja -C build-gcc
    - name: gcc tests
      run: ninja -C build-gcc test
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
    - name: coverage report
      run: |
        cmake --preset coverage
        ninja -C build-coverage coverage-report
      env:
        CC: clang
        CXX: clang++
    - name: strip
      run: |
        strip ${{ github.workspace }}/install/usr/bin/*
        strip ${{ github.workspace }}/install/usr/lib/*.so
    - uses: forgejo/upload-artifact@v4
      with:
        name: build
        path: install
    - uses: forgejo/upload-artifact@v4
      with:
        name: coverage-report
        path: build-coverage/coverage_html
